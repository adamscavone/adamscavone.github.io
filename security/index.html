<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="dark light">
<title>Protected Document</title>
<style>
  :root {
    --bg: #0b0d10;
    --bg-alt: #14171c;
    --bg-card: #1a1e24;
    --fg: #e6e8eb;
    --fg-dim: #9aa0a6;
    --fg-muted: #6b7075;
    --accent: #8ab4f8;
    --accent-2: #c8d96f;
    --danger: #f28b82;
    --danger-bg: #3a1e1e;
    --warn: #fdd663;
    --ok: #81c995;
    --border: #2d3239;
    --code-bg: #0d1117;
    --link: #8ab4f8;
    --max-w: 820px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa;
      --bg-alt: #fff;
      --bg-card: #fff;
      --fg: #1a1a1a;
      --fg-dim: #555;
      --fg-muted: #888;
      --accent: #1a5fd3;
      --accent-2: #7a8a3f;
      --danger: #c5221f;
      --danger-bg: #fce4e4;
      --warn: #b27300;
      --ok: #137333;
      --border: #e0e0e0;
      --code-bg: #f4f4f6;
      --link: #1a5fd3;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding-bottom: 4rem;
  }
  /* Gate screen */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    text-align: center;
  }
  #gate .lock-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  }
  #gate h1 {
    font-size: 1.2rem;
    margin: 0 0 .25rem;
    font-weight: 600;
  }
  #gate .sub { color: var(--fg-dim); font-size: .9rem; margin: 0 0 1.25rem; }
  #gate form { display: flex; flex-direction: column; gap: .75rem; }
  #gate input[type="password"] {
    font: inherit;
    padding: .75rem .9rem;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    -webkit-appearance: none;
  }
  #gate input[type="password"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  #gate button {
    font: inherit;
    font-weight: 600;
    padding: .75rem 1rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #gate button:disabled { opacity: .6; cursor: wait; }
  #gate .err {
    color: var(--danger);
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    border-radius: 6px;
    padding: .5rem .75rem;
    font-size: .85rem;
    display: none;
  }
  #gate .err.on { display: block; }
  #gate .hint {
    margin-top: 1rem;
    font-size: .75rem;
    color: var(--fg-muted);
    line-height: 1.4;
  }
  /* Content */
  #content { display: none; }
  #content.on { display: block; }
  .doc-header {
    padding: 1.5rem 1rem .5rem;
    max-width: var(--max-w);
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .doc-header h1 { margin: 0 0 .25rem; font-size: 1.4rem; line-height: 1.2; font-weight: 700; }
  .doc-header .meta { margin: 0; color: var(--fg-dim); font-size: .8rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .toc {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .toc ul { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: .4rem .8rem; }
  .toc li { font-size: .85rem; }
  .toc a {
    color: var(--accent);
    text-decoration: none;
    padding: .25rem .4rem;
    border-radius: 4px;
  }
  .toc a:hover, .toc a:focus { background: var(--bg-card); }
  .doc-main { max-width: var(--max-w); margin: 0 auto; padding: 0 1rem; }
  .doc-section { padding: 1.75rem 0 1rem; border-bottom: 1px solid var(--border); }
  .doc-section:last-child { border-bottom: none; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    padding: 0 0 .5rem;
    position: sticky;
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 5;
    margin: 0 -1rem;
    padding: .75rem 1rem .5rem;
  }
  .section-header h2 { margin: 0; font-size: 1.15rem; font-weight: 700; }
  .back-to-top {
    font-size: .75rem;
    color: var(--fg-dim);
    text-decoration: none;
    flex-shrink: 0;
  }
  .back-to-top:hover { color: var(--accent); }
  .section-body h1, .section-body h2, .section-body h3, .section-body h4 {
    line-height: 1.25;
    margin: 1.5em 0 .5em;
    font-weight: 700;
  }
  .section-body h1 { font-size: 1.2rem; }
  .section-body h2 { font-size: 1.1rem; }
  .section-body h3 { font-size: 1rem; }
  .section-body h4 { font-size: .95rem; color: var(--fg-dim); }
  .section-body p { margin: .75em 0; }
  .section-body ul, .section-body ol { padding-left: 1.25rem; margin: .5em 0; }
  .section-body li { margin: .15em 0; }
  .section-body code {
    font: 0.85em ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--code-bg);
    padding: .1em .35em;
    border-radius: 4px;
    border: 1px solid var(--border);
    word-break: break-word;
  }
  .section-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: .75rem;
    border-radius: 6px;
    overflow-x: auto;
    font-size: .8rem;
    line-height: 1.45;
  }
  .section-body pre code {
    background: transparent;
    border: none;
    padding: 0;
  }
  .section-body a { color: var(--link); }
  .section-body blockquote {
    border-left: 3px solid var(--border);
    margin: .75em 0;
    padding: .25em .75em;
    color: var(--fg-dim);
  }
  .section-body table {
    border-collapse: collapse;
    width: 100%;
    margin: .75em 0;
    font-size: .85rem;
    display: block;
    overflow-x: auto;
  }
  .section-body th, .section-body td {
    border: 1px solid var(--border);
    padding: .35rem .6rem;
    text-align: left;
    vertical-align: top;
  }
  .section-body th {
    background: var(--bg-card);
    font-weight: 600;
  }
  .section-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25em 0;
  }
  .section-body strong { color: var(--fg); font-weight: 700; }
  .section-body em { color: var(--fg); }
  .doc-footer {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 2rem 1rem 1rem;
    text-align: center;
    color: var(--fg-muted);
    font-size: .8rem;
  }
  /* Feedback widget */
  .feedback-block {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px dashed var(--border);
  }
  .feedback-details {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .5rem .75rem;
  }
  .feedback-details[open] { padding-bottom: .75rem; }
  .feedback-summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .5rem;
    padding: .4rem 0;
    font-size: .9rem;
    color: var(--fg-dim);
    user-select: none;
  }
  .feedback-summary::-webkit-details-marker { display: none; }
  .feedback-summary::after {
    content: "▸";
    color: var(--fg-muted);
    font-size: .75rem;
    transition: transform .15s ease;
    margin-left: auto;
    padding-left: .5rem;
  }
  .feedback-details[open] .feedback-summary::after { transform: rotate(90deg); }
  .feedback-label { flex: 0 1 auto; }
  .feedback-badge {
    display: none;
    font-size: .7rem;
    background: var(--accent-2);
    color: var(--bg);
    padding: .1rem .45rem;
    border-radius: 999px;
    font-weight: 700;
    min-width: 1.4rem;
    text-align: center;
  }
  .feedback-badge.on { display: inline-block; }
  .feedback-textarea {
    width: 100%;
    min-height: 6em;
    margin-top: .5rem;
    padding: .6rem .75rem;
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    resize: vertical;
    -webkit-appearance: none;
  }
  .feedback-textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: var(--accent);
  }
  .feedback-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: .4rem;
    gap: .75rem;
    min-height: 1.5em;
  }
  .feedback-status {
    font-size: .75rem;
    color: var(--fg-muted);
    font-style: italic;
    transition: opacity .2s ease;
  }
  .feedback-status.on { opacity: 1; }
  .feedback-status { opacity: 0; }
  .feedback-clear {
    font: inherit;
    font-size: .75rem;
    padding: .3rem .7rem;
    background: transparent;
    color: var(--fg-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  .feedback-clear:hover { color: var(--danger); border-color: var(--danger); }
  /* TOC note marker */
  .toc a .toc-marker {
    display: none;
    margin-left: .25rem;
    font-size: .75rem;
    color: var(--accent-2);
  }
  .toc a.has-notes .toc-marker { display: inline; }
  /* Export notes floating button */
  #export-notes-btn {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    padding: .75rem 1rem;
    background: var(--accent-2);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    font: 600 .85rem -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.1);
    cursor: pointer;
    z-index: 20;
    display: none;
  }
  #export-notes-btn.on { display: inline-flex; align-items: center; gap: .3rem; }
  #export-notes-btn:active { transform: scale(0.97); }
  @supports (padding: max(0px)) {
    #export-notes-btn {
      bottom: max(1rem, env(safe-area-inset-bottom));
      right: max(1rem, env(safe-area-inset-right));
    }
  }
  /* small tweaks for phone */
  @media (max-width: 480px) {
    .doc-header { padding: 1rem .75rem .5rem; }
    .doc-header h1 { font-size: 1.2rem; }
    .toc { padding: .75rem; }
    .doc-main { padding: 0 .75rem; }
    .section-header { margin: 0 -.75rem; padding: .6rem .75rem .4rem; }
  }
</style>
</head>
<body>
<section id="gate">
  <div class="lock-card">
    <h1>🔒 Protected Document</h1>
    <p class="sub">Enter passphrase to decrypt.</p>
    <form id="unlock-form">
      <input type="password" id="pw" placeholder="Passphrase" autocomplete="current-password" autofocus>
      <div class="err" id="err">Wrong passphrase.</div>
      <button type="submit" id="unlock-btn">Unlock</button>
    </form>
    <p class="hint">This page holds an encrypted payload. The content never leaves your device in plaintext. If you close the tab, you'll need the passphrase again.</p>
  </div>
</section>
<div id="content"></div>
<button type="button" id="export-notes-btn" title="Export all notes">📝 Export notes</button>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(password, salt, iterations) {
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    new TextEncoder().encode(password),
    { name: "PBKDF2" },
    false,
    ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryUnlock(password) {
  const { salt, iv, ct, iterations } = ENCRYPTED_PAYLOAD;
  const saltBytes = b64d(salt);
  const ivBytes = b64d(iv);
  const ctBytes = b64d(ct);
  const key = await deriveKey(password, saltBytes, iterations);
  const plainBuf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: ivBytes },
    key,
    ctBytes
  );
  return new TextDecoder().decode(plainBuf);
}

/* --- Feedback / notes subsystem --------------------------------------- */
const FEEDBACK_KEY = "kondo-wave1-review-feedback-v1";

function loadNotes() {
  try { return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || "{}"); }
  catch { return {}; }
}
function saveNotes(obj) {
  localStorage.setItem(FEEDBACK_KEY, JSON.stringify(obj));
}
function nonEmptyCount(obj) {
  return Object.keys(obj).filter(k => (obj[k] || "").trim().length > 0).length;
}
function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

function updateExportBadge() {
  const data = loadNotes();
  const count = nonEmptyCount(data);
  const btn = document.getElementById("export-notes-btn");
  if (!btn) return;
  if (count > 0) {
    btn.classList.add("on");
    btn.textContent = `📝 Export notes (${count})`;
  } else {
    btn.classList.remove("on");
  }
  // Per-section badge + TOC marker
  Object.keys(data).concat(
    Array.from(document.querySelectorAll(".feedback-textarea")).map(t => t.dataset.feedbackSlug)
  ).forEach(slug => {
    const has = (data[slug] || "").trim().length > 0;
    const badge = document.querySelector(`[data-feedback-badge-for="${slug}"]`);
    if (badge) {
      badge.textContent = has ? "●" : "";
      badge.classList.toggle("on", has);
    }
    const tocLink = document.querySelector(`.toc a[href="#sec-${slug}"]`);
    if (tocLink) {
      let marker = tocLink.querySelector(".toc-marker");
      if (!marker) {
        marker = document.createElement("span");
        marker.className = "toc-marker";
        marker.textContent = "●";
        tocLink.appendChild(marker);
      }
      tocLink.classList.toggle("has-notes", has);
    }
  });
}

function flashStatus(slug, text) {
  const el = document.querySelector(`[data-feedback-status-for="${slug}"]`);
  if (!el) return;
  el.textContent = text;
  el.classList.add("on");
  setTimeout(() => { el.classList.remove("on"); el.textContent = ""; }, 1200);
}

function hydrateFeedback() {
  const data = loadNotes();
  document.querySelectorAll(".feedback-textarea").forEach(ta => {
    const slug = ta.dataset.feedbackSlug;
    if (data[slug]) {
      ta.value = data[slug];
      if (!ta.closest("details").hasAttribute("open")) {
        ta.closest("details").setAttribute("open", "");
      }
    }
    const persist = debounce(() => {
      const d = loadNotes();
      if (ta.value.trim().length === 0) delete d[slug];
      else d[slug] = ta.value;
      saveNotes(d);
      updateExportBadge();
      flashStatus(slug, "Saved");
    }, 350);
    ta.addEventListener("input", persist);
    ta.addEventListener("blur", () => persist());
  });
  document.querySelectorAll("[data-feedback-clear-for]").forEach(btn => {
    btn.addEventListener("click", () => {
      const slug = btn.dataset.feedbackClearFor;
      const ta = document.querySelector(`[data-feedback-slug="${slug}"]`);
      if (!ta || ta.value.trim().length === 0) return;
      if (!confirm(`Clear your notes on this section?`)) return;
      ta.value = "";
      const d = loadNotes();
      delete d[slug];
      saveNotes(d);
      updateExportBadge();
      flashStatus(slug, "Cleared");
    });
  });
  updateExportBadge();
}

async function exportNotes() {
  const data = loadNotes();
  const sections = Array.from(document.querySelectorAll(".feedback-textarea")).map(ta => ({
    slug: ta.dataset.feedbackSlug,
    title: ta.dataset.feedbackTitle,
  }));
  const stamp = new Date().toISOString().replace("T", " ").slice(0, 16) + " UTC";
  const nowSlug = new Date().toISOString().slice(0, 10);
  let md = "# KONDO Wave 1 — Security Review — Reading Notes\n\n";
  md += `Exported: ${stamp}\n`;
  md += `Reviewed commit: 6b30a75 on kondo/wave-1\n\n`;
  md += "---\n\n";
  let any = false;
  for (const s of sections) {
    const text = (data[s.slug] || "").trim();
    if (!text) continue;
    md += `## ${s.title}\n\n${text}\n\n`;
    any = true;
  }
  if (!any) {
    alert("No notes saved yet.");
    return;
  }
  const filename = `kondo-review-notes-${nowSlug}.md`;
  const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
  const file = new File([blob], filename, { type: "text/markdown" });

  // Prefer native share sheet on mobile (iOS/Android) — lets you AirDrop, email, copy to Files, etc.
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: "KONDO review notes", text: `Notes exported ${stamp}` });
      return;
    } catch (e) {
      if (e.name === "AbortError") return; // user cancelled
      // fall through to download
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

document.getElementById("export-notes-btn")?.addEventListener("click", exportNotes);

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errEl.classList.remove("on");
  btn.disabled = true;
  btn.textContent = "Decrypting…";
  try {
    const html = await tryUnlock(pwInput.value);
    sessionStorage.setItem("_pw", pwInput.value);
    show(html);
  } catch (err) {
    errEl.classList.add("on");
    btn.disabled = false;
    btn.textContent = "Unlock";
    pwInput.select();
  }
});
</script>
</body>
