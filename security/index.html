<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="dark light">
<title>Protected Document</title>
<style>
  :root {
    --bg: #0b0d10;
    --bg-alt: #14171c;
    --bg-card: #1a1e24;
    --fg: #e6e8eb;
    --fg-dim: #9aa0a6;
    --fg-muted: #6b7075;
    --accent: #8ab4f8;
    --accent-2: #c8d96f;
    --danger: #f28b82;
    --danger-bg: #3a1e1e;
    --warn: #fdd663;
    --ok: #81c995;
    --border: #2d3239;
    --code-bg: #0d1117;
    --link: #8ab4f8;
    --max-w: 820px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa;
      --bg-alt: #fff;
      --bg-card: #fff;
      --fg: #1a1a1a;
      --fg-dim: #555;
      --fg-muted: #888;
      --accent: #1a5fd3;
      --accent-2: #7a8a3f;
      --danger: #c5221f;
      --danger-bg: #fce4e4;
      --warn: #b27300;
      --ok: #137333;
      --border: #e0e0e0;
      --code-bg: #f4f4f6;
      --link: #1a5fd3;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding-bottom: 4rem;
  }
  /* Gate screen */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    text-align: center;
  }
  #gate .lock-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  }
  #gate h1 {
    font-size: 1.2rem;
    margin: 0 0 .25rem;
    font-weight: 600;
  }
  #gate .sub { color: var(--fg-dim); font-size: .9rem; margin: 0 0 1.25rem; }
  #gate form { display: flex; flex-direction: column; gap: .75rem; }
  #gate input[type="password"] {
    font: inherit;
    padding: .75rem .9rem;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    -webkit-appearance: none;
  }
  #gate input[type="password"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  #gate button {
    font: inherit;
    font-weight: 600;
    padding: .75rem 1rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #gate button:disabled { opacity: .6; cursor: wait; }
  #gate .err {
    color: var(--danger);
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    border-radius: 6px;
    padding: .5rem .75rem;
    font-size: .85rem;
    display: none;
  }
  #gate .err.on { display: block; }
  #gate .hint {
    margin-top: 1rem;
    font-size: .75rem;
    color: var(--fg-muted);
    line-height: 1.4;
  }
  /* Content */
  #content { display: none; }
  #content.on { display: block; }
  .doc-header {
    padding: 1.5rem 1rem .5rem;
    max-width: var(--max-w);
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .doc-header h1 { margin: 0 0 .25rem; font-size: 1.4rem; line-height: 1.2; font-weight: 700; }
  .doc-header .meta { margin: 0; color: var(--fg-dim); font-size: .8rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .toc {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .toc ul { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: .4rem .8rem; }
  .toc li { font-size: .85rem; }
  .toc a {
    color: var(--accent);
    text-decoration: none;
    padding: .25rem .4rem;
    border-radius: 4px;
  }
  .toc a:hover, .toc a:focus { background: var(--bg-card); }
  .doc-main { max-width: var(--max-w); margin: 0 auto; padding: 0 1rem; }
  .doc-section { padding: 1.75rem 0 1rem; border-bottom: 1px solid var(--border); }
  .doc-section:last-child { border-bottom: none; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    padding: 0 0 .5rem;
    position: sticky;
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 5;
    margin: 0 -1rem;
    padding: .75rem 1rem .5rem;
  }
  .section-header h2 { margin: 0; font-size: 1.15rem; font-weight: 700; }
  .back-to-top {
    font-size: .75rem;
    color: var(--fg-dim);
    text-decoration: none;
    flex-shrink: 0;
  }
  .back-to-top:hover { color: var(--accent); }
  .section-body h1, .section-body h2, .section-body h3, .section-body h4 {
    line-height: 1.25;
    margin: 1.5em 0 .5em;
    font-weight: 700;
  }
  .section-body h1 { font-size: 1.2rem; }
  .section-body h2 { font-size: 1.1rem; }
  .section-body h3 { font-size: 1rem; }
  .section-body h4 { font-size: .95rem; color: var(--fg-dim); }
  .section-body p { margin: .75em 0; }
  .section-body ul, .section-body ol { padding-left: 1.25rem; margin: .5em 0; }
  .section-body li { margin: .15em 0; }
  .section-body code {
    font: 0.85em ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--code-bg);
    padding: .1em .35em;
    border-radius: 4px;
    border: 1px solid var(--border);
    word-break: break-word;
  }
  .section-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: .75rem;
    border-radius: 6px;
    overflow-x: auto;
    font-size: .8rem;
    line-height: 1.45;
  }
  .section-body pre code {
    background: transparent;
    border: none;
    padding: 0;
  }
  .section-body a { color: var(--link); }
  .section-body blockquote {
    border-left: 3px solid var(--border);
    margin: .75em 0;
    padding: .25em .75em;
    color: var(--fg-dim);
  }
  .section-body table {
    border-collapse: collapse;
    width: 100%;
    margin: .75em 0;
    font-size: .85rem;
    display: block;
    overflow-x: auto;
  }
  .section-body th, .section-body td {
    border: 1px solid var(--border);
    padding: .35rem .6rem;
    text-align: left;
    vertical-align: top;
  }
  .section-body th {
    background: var(--bg-card);
    font-weight: 600;
  }
  .section-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25em 0;
  }
  .section-body strong { color: var(--fg); font-weight: 700; }
  .section-body em { color: var(--fg); }
  .doc-footer {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 2rem 1rem 1rem;
    text-align: center;
    color: var(--fg-muted);
    font-size: .8rem;
  }
  /* small tweaks for phone */
  @media (max-width: 480px) {
    .doc-header { padding: 1rem .75rem .5rem; }
    .doc-header h1 { font-size: 1.2rem; }
    .toc { padding: .75rem; }
    .doc-main { padding: 0 .75rem; }
    .section-header { margin: 0 -.75rem; padding: .6rem .75rem .4rem; }
  }
</style>
</head>
<body>
<section id="gate">
  <div class="lock-card">
    <h1>🔒 Protected Document</h1>
    <p class="sub">Enter passphrase to decrypt.</p>
    <form id="unlock-form">
      <input type="password" id="pw" placeholder="Passphrase" autocomplete="current-password" autofocus>
      <div class="err" id="err">Wrong passphrase.</div>
      <button type="submit" id="unlock-btn">Unlock</button>
    </form>
    <p class="hint">This page holds an encrypted payload. The content never leaves your device in plaintext. If you close the tab, you'll need the passphrase again.</p>
  </div>
</section>
<div id="content"></div>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function deriveKey(password, salt, iterations) {
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    new TextEncoder().encode(password),
    { name: "PBKDF2" },
    false,
    ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryUnlock(password) {
  const { salt, iv, ct, iterations } = ENCRYPTED_PAYLOAD;
  const saltBytes = b64d(salt);
  const ivBytes = b64d(iv);
  const ctBytes = b64d(ct);
  const key = await deriveKey(password, saltBytes, iterations);
  const plainBuf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: ivBytes },
    key,
    ctBytes
  );
  return new TextDecoder().decode(plainBuf);
}

const form = document.getElementById("unlock-form");
const pwInput = document.getElementById("pw");
const errEl = document.getElementById("err");
const btn = document.getElementById("unlock-btn");
const contentEl = document.getElementById("content");
const gateEl = document.getElementById("gate");

// Try sessionStorage'd password (so intra-tab reloads don't require re-entry).
const cachedPw = sessionStorage.getItem("_pw");
if (cachedPw) {
  tryUnlock(cachedPw).then(show).catch(() => sessionStorage.removeItem("_pw"));
}

function show(html) {
  contentEl.innerHTML = html;
  contentEl.classList.add("on");
  gateEl.style.display = "none";
  document.title = "KONDO Wave 1 — Security Review";
  window.scrollTo(0, 0);
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errEl.classList.remove("on");
  btn.disabled = true;
  btn.textContent = "Decrypting…";
  try {
    const html = await tryUnlock(pwInput.value);
    sessionStorage.setItem("_pw", pwInput.value);
    show(html);
  } catch (err) {
    errEl.classList.add("on");
    btn.disabled = false;
    btn.textContent = "Unlock";
    pwInput.select();
  }
});
</script>
