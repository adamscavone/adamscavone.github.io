<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="dark light">
<title>Adam Scavone</title>
<style>
  :root {
    --bg: #0b0d10;
    --fg: #e6e8eb;
    --fg-dim: #9aa0a6;
    --accent: #c8d96f;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #fafafa; --fg: #1a1a1a; --fg-dim: #666; --accent: #7a8a3f; }
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }
  main {
    max-width: 480px;
    text-align: center;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 .5rem;
  }
  p {
    color: var(--fg-dim);
    font-size: .95rem;
    margin: 0;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin: 0 .25rem .1rem 0;
    vertical-align: middle;
  }
</style>
</head>
<body>
<main>
  <h1><span class="dot"></span>Adam Scavone</h1>
  <p>Private work space. Direct links only.</p>
</main>
</body>
</html>
