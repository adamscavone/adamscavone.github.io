<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="dark light">
<title>Reporting Desk — Field Notes</title>
<style>
  :root {
    --bg: #0b0d10;
    --bg-alt: #14171c;
    --bg-card: #1a1e24;
    --bg-feedback: #181c22;
    --fg: #e6e8eb;
    --fg-dim: #9aa0a6;
    --fg-muted: #6b7075;
    --accent: #8ab4f8;
    --accent-2: #c8d96f;
    --accent-bg: #18283f;
    --danger: #f28b82;
    --danger-bg: #3a1e1e;
    --warn: #fdd663;
    --ok: #81c995;
    --border: #2d3239;
    --code-bg: #0d1117;
    --link: #8ab4f8;
    --max-w: 820px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa;
      --bg-alt: #fff;
      --bg-card: #fff;
      --bg-feedback: #f0f4fa;
      --fg: #1a1a1a;
      --fg-dim: #555;
      --fg-muted: #888;
      --accent: #1a5fd3;
      --accent-2: #7a8a3f;
      --accent-bg: #e7f0fd;
      --danger: #c5221f;
      --danger-bg: #fce4e4;
      --warn: #b27300;
      --ok: #137333;
      --border: #e0e0e0;
      --code-bg: #f4f4f6;
      --link: #1a5fd3;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding-bottom: 4rem;
  }
  /* Gate screen */
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    text-align: center;
  }
  #gate .lock-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  }
  #gate h1 { font-size: 1.2rem; margin: 0 0 .25rem; font-weight: 600; }
  #gate .sub { color: var(--fg-dim); font-size: .9rem; margin: 0 0 1.25rem; }
  #gate form { display: flex; flex-direction: column; gap: .75rem; }
  #gate input[type="password"] {
    font: inherit;
    padding: .75rem .9rem;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 100%;
    -webkit-appearance: none;
  }
  #gate input[type="password"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  #gate button {
    font: inherit;
    font-weight: 600;
    padding: .75rem 1rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #gate button:disabled { opacity: .6; cursor: wait; }
  #gate .err {
    color: var(--danger);
    background: var(--danger-bg);
    border: 1px solid var(--danger);
    border-radius: 6px;
    padding: .5rem .75rem;
    font-size: .85rem;
    display: none;
  }
  #gate .err.on { display: block; }
  #gate .hint {
    margin-top: 1rem;
    font-size: .75rem;
    color: var(--fg-muted);
    line-height: 1.4;
  }
  /* Content */
  #content { display: none; }
  #content.on { display: block; }
  .doc-header {
    padding: 1.5rem 1rem 1rem;
    max-width: var(--max-w);
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .doc-header h1 {
    margin: 0 0 .25rem;
    font-size: 1.5rem;
    line-height: 1.2;
    font-weight: 700;
  }
  .doc-header .meta {
    margin: 0 0 1rem;
    color: var(--fg-dim);
    font-size: .78rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    line-height: 1.5;
  }
  .feedback-hint {
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: .75rem .9rem;
    font-size: .82rem;
    line-height: 1.5;
    color: var(--fg);
  }
  .feedback-hint strong { color: var(--accent); }
  .toc {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .toc-title {
    font-size: .75rem;
    font-weight: 700;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: .6rem;
  }
  .toc-group { margin-bottom: .9rem; }
  .toc-group:last-child { margin-bottom: 0; }
  .toc-group-title {
    font-size: .8rem;
    font-weight: 700;
    color: var(--fg);
    margin-bottom: .3rem;
  }
  .toc-label {
    display: inline-block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: .05rem .35rem;
    border-radius: 3px;
    font-size: .7rem;
    color: var(--fg-dim);
    margin-right: .25rem;
  }
  .toc ul { list-style: none; margin: 0; padding: 0 0 0 1rem; }
  .toc li {
    font-size: .8rem;
    padding: .08rem 0;
  }
  .toc a {
    color: var(--link);
    text-decoration: none;
  }
  .toc a:active, .toc a:hover, .toc a:focus { text-decoration: underline; }
  .doc-main { max-width: var(--max-w); margin: 0 auto; padding: 0 1rem; }
  .doc-section {
    padding: 1.75rem 0 1rem;
    border-bottom: 1px solid var(--border);
  }
  .doc-section:last-child { border-bottom: none; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    position: sticky;
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 5;
    margin: 0 -1rem .5rem;
    padding: .75rem 1rem .5rem;
  }
  .section-header-text { flex: 1; min-width: 0; }
  .section-doc-label {
    font-size: .7rem;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: .15rem;
  }
  .section-header h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.25;
  }
  .back-to-top {
    font-size: 1rem;
    color: var(--fg-dim);
    text-decoration: none;
    flex-shrink: 0;
    padding: .2rem .45rem;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .back-to-top:active, .back-to-top:hover { color: var(--accent); border-color: var(--accent); }
  .section-body h1, .section-body h2, .section-body h3, .section-body h4 {
    line-height: 1.25;
    margin: 1.5em 0 .5em;
    font-weight: 700;
  }
  .section-body h1 { font-size: 1.15rem; }
  .section-body h2 { font-size: 1.05rem; margin-top: 0; }
  .section-body h3 { font-size: .98rem; }
  .section-body h4 { font-size: .92rem; color: var(--fg-dim); }
  .section-body p { margin: .75em 0; }
  .section-body ul, .section-body ol { padding-left: 1.25rem; margin: .5em 0; }
  .section-body li { margin: .15em 0; }
  .section-body code {
    font: 0.85em ui-monospace, SFMono-Regular, Menlo, monospace;
    background: var(--code-bg);
    padding: .1em .35em;
    border-radius: 4px;
    border: 1px solid var(--border);
    word-break: break-word;
  }
  .section-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: .75rem;
    border-radius: 6px;
    overflow-x: auto;
    font-size: .8rem;
    line-height: 1.45;
  }
  .section-body pre code {
    background: transparent;
    border: none;
    padding: 0;
  }
  .section-body a { color: var(--link); }
  .section-body blockquote {
    border-left: 3px solid var(--accent);
    margin: .75em 0;
    padding: .25em .75em;
    color: var(--fg-dim);
    background: var(--bg-card);
    border-radius: 0 6px 6px 0;
  }
  .section-body blockquote p { margin: .4em 0; }
  .section-body table {
    border-collapse: collapse;
    width: 100%;
    margin: .75em 0;
    font-size: .82rem;
    display: block;
    overflow-x: auto;
  }
  .section-body th, .section-body td {
    border: 1px solid var(--border);
    padding: .35rem .6rem;
    text-align: left;
    vertical-align: top;
  }
  .section-body th { background: var(--bg-card); font-weight: 600; }
  .section-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.25em 0;
  }
  .section-body strong { color: var(--fg); font-weight: 700; }
  .section-body em { color: var(--fg); }

  /* Feedback block (injected by JS after decrypt) */
  .feedback-block {
    margin-top: 1.25rem;
    background: var(--bg-feedback);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    overflow: hidden;
  }
  .feedback-block summary {
    list-style: none;
    padding: .7rem .9rem;
    font-size: .85rem;
    font-weight: 600;
    color: var(--fg-dim);
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .5rem;
  }
  .feedback-block summary::-webkit-details-marker { display: none; }
  .feedback-block summary::before { content: "📝 "; }
  .feedback-block[open] summary { border-bottom: 1px solid var(--border); }
  .feedback-block .fb-has-content {
    display: none;
    font-size: .7rem;
    background: var(--accent);
    color: var(--bg);
    padding: .1rem .4rem;
    border-radius: 10px;
    font-weight: 700;
  }
  .feedback-block[data-has-content="1"] .fb-has-content { display: inline-block; }
  .feedback-inner { padding: .75rem .9rem .85rem; }
  .feedback-textarea {
    width: 100%;
    min-height: 120px;
    padding: .7rem .8rem;
    font: inherit;
    font-size: .92rem;
    line-height: 1.5;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    resize: vertical;
    -webkit-appearance: none;
  }
  .feedback-textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: var(--accent);
  }
  .feedback-actions {
    display: flex;
    align-items: center;
    gap: .5rem;
    flex-wrap: wrap;
    margin-top: .6rem;
  }
  .feedback-actions button {
    font: inherit;
    font-size: .82rem;
    font-weight: 600;
    padding: .55rem .9rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    min-height: 44px;
  }
  .feedback-actions button.secondary {
    background: transparent;
    color: var(--fg-dim);
    border: 1px solid var(--border);
  }
  .feedback-actions button.danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .feedback-actions .fb-saved {
    font-size: .75rem;
    color: var(--ok);
    opacity: 0;
    transition: opacity .25s;
    margin-left: auto;
  }
  .feedback-actions .fb-saved.on { opacity: 1; }
  .feedback-actions .fb-char-count {
    font-size: .7rem;
    color: var(--fg-muted);
    margin-left: auto;
  }

  /* Doc footer with export-all */
  .doc-footer {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 2rem 1rem 1rem;
    text-align: center;
    color: var(--fg-muted);
    font-size: .8rem;
  }
  .export-all {
    display: flex;
    gap: .75rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
  .export-all button {
    font: inherit;
    font-size: .9rem;
    font-weight: 700;
    padding: .85rem 1.25rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    min-height: 48px;
  }
  .export-all button.danger {
    background: transparent;
    color: var(--danger);
    border: 2px solid var(--danger);
  }
  .muted { color: var(--fg-muted); font-size: .75rem; }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--fg);
    color: var(--bg);
    padding: .75rem 1.25rem;
    border-radius: 8px;
    font-size: .88rem;
    font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 100;
    transition: transform .3s, opacity .3s;
    opacity: 0;
    pointer-events: none;
    max-width: 90vw;
    text-align: center;
  }
  .toast.on {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.err { background: var(--danger); color: #fff; }
  .toast.ok { background: var(--ok); color: #fff; }

  /* small tweaks for phone */
  @media (max-width: 480px) {
    body { padding-bottom: 5rem; }
    .doc-header { padding: 1rem .75rem .75rem; }
    .doc-header h1 { font-size: 1.3rem; }
    .doc-header .meta { font-size: .72rem; }
    .feedback-hint { font-size: .78rem; padding: .65rem .75rem; }
    .toc { padding: .85rem .75rem; }
    .doc-main { padding: 0 .75rem; }
    .section-header { margin: 0 -.75rem .4rem; padding: .6rem .75rem .4rem; }
    .section-header h2 { font-size: 1.02rem; }
    .feedback-block summary { padding: .65rem .8rem; font-size: .8rem; }
    .feedback-inner { padding: .65rem .75rem .75rem; }
    .feedback-textarea { min-height: 100px; font-size: 16px; /* prevents iOS zoom */ }
    .feedback-actions button { padding: .6rem .85rem; font-size: .78rem; }
    .export-all button { padding: .8rem 1rem; font-size: .85rem; }
  }
</style>
</head>
<body>
<section id="gate">
  <div class="lock-card">
    <h1>🔒 Protected Document</h1>
    <p class="sub">Ohio Reporting Desk — Field Notes</p>
    <form id="unlock-form">
      <input type="password" id="pw" placeholder="Passphrase" autocomplete="current-password" autofocus>
      <div class="err" id="err">Wrong passphrase.</div>
      <button type="submit" id="unlock-btn">Unlock</button>
    </form>
    <p class="hint">This page holds an encrypted payload. Content never leaves your device in plaintext. Feedback you type is stored on this device only. Closing the tab keeps feedback; clearing browser data erases it.</p>
  </div>
</section>
<div id="content"></div>
<div class="toast" id="toast"></div>

const LS_PREFIX = "rdfn-fb-";        // reporting desk field notes - feedback
const LS_PREFIX_V = "rdfn-meta";     // scoped meta

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(password, salt, iterations) {
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    new TextEncoder().encode(password),
    { name: "PBKDF2" },
    false,
    ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryUnlock(password) {
  const { salt, iv, ct, iterations } = ENCRYPTED_PAYLOAD;
  const saltBytes = b64d(salt);
  const ivBytes = b64d(iv);
  const ctBytes = b64d(ct);
  const key = await deriveKey(password, saltBytes, iterations);
  const plainBuf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: ivBytes },
    key,
    ctBytes
  );
  return new TextDecoder().decode(plainBuf);
}

// Toast helper
let toastTimer = null;
function toast(msg, kind) {
  toastEl.textContent = msg;
  toastEl.className = "toast on" + (kind ? " " + kind : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("on"), 2800);
}

// Share helper — native share first, clipboard fallback, download fallback
async function shareText(title, body, filename) {
  // Mobile: native share sheet (Messages, Notes, Mail, etc.)
  if (navigator.share) {
    try {
      await navigator.share({ title, text: body });
      return true;
    } catch (e) {
      if (e && e.name === "AbortError") return false;
      // fall through to clipboard
    }
  }
  // Clipboard fallback
  try {
    await navigator.clipboard.writeText(body);
    toast("✓ Copied to clipboard", "ok");
    // Also offer download for long exports
    if (filename && body.length > 500) downloadFile(filename, body);
    return true;
  } catch (e) {
    // Final fallback: download only
    if (filename) {
      downloadFile(filename, body);
      toast("✓ Downloaded as file", "ok");
      return true;
    }
    toast("Couldn't share — try again", "err");
    return false;
  }
}

function downloadFile(filename, content) {
  const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
}

function fmtTimestamp() {
  const d = new Date();
  return d.toISOString().replace("T", " ").slice(0, 19) + "Z";
}

// Debounced save
function debounce(fn, wait) {
  let t;
  return function (...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), wait);
  };
}

// After decrypt: inject feedback blocks into every .doc-section and wire up listeners.
function installFeedbackBlocks() {
  const sections = contentEl.querySelectorAll(".doc-section");
  sections.forEach(sec => {
    const slug = sec.dataset.slug;
    const title = sec.dataset.title;
    const docLabel = sec.dataset.docLabel || "";
    const docTitle = sec.dataset.docTitle || "";
    const storageKey = LS_PREFIX + slug;

    const details = document.createElement("details");
    details.className = "feedback-block";
    details.innerHTML = `
      <summary>
        <span>Feedback on this section <span class="fb-has-content">saved</span></span>
        <span class="fb-toggle">+</span>
      </summary>
      <div class="feedback-inner">
        <textarea class="feedback-textarea"
                  placeholder="Your notes on this section — tap Share to send to yourself via Messages, Notes, Mail, or whatever."
                  aria-label="Feedback for ${title.replace(/"/g, '&quot;')}"></textarea>
        <div class="feedback-actions">
          <button type="button" class="fb-share">📤 Share</button>
          <button type="button" class="fb-clear danger">Clear</button>
          <span class="fb-char-count">0 chars</span>
          <span class="fb-saved">✓ saved</span>
        </div>
      </div>
    `;
    sec.appendChild(details);

    const ta = details.querySelector(".feedback-textarea");
    const savedIndicator = details.querySelector(".fb-saved");
    const charCount = details.querySelector(".fb-char-count");

    // Load existing value
    const existing = localStorage.getItem(storageKey) || "";
    ta.value = existing;
    charCount.textContent = `${existing.length} chars`;
    if (existing.length > 0) details.dataset.hasContent = "1";

    const save = debounce(() => {
      const v = ta.value;
      if (v.length === 0) {
        localStorage.removeItem(storageKey);
        details.dataset.hasContent = "";
      } else {
        localStorage.setItem(storageKey, v);
        details.dataset.hasContent = "1";
      }
      savedIndicator.classList.add("on");
      setTimeout(() => savedIndicator.classList.remove("on"), 1500);
    }, 350);

    ta.addEventListener("input", () => {
      charCount.textContent = `${ta.value.length} chars`;
      save();
    });

    details.querySelector(".fb-share").addEventListener("click", async () => {
      const v = ta.value.trim();
      if (!v) {
        toast("Nothing to share yet", "err");
        return;
      }
      const body = `# Reporting Desk Field Notes — Feedback

**Section:** ${docLabel}. ${docTitle} → ${title}
**Exported:** ${fmtTimestamp()}

---

${v}
`;
      await shareText(`Feedback: ${title}`, body, `feedback-${slug}.md`);
    });

    details.querySelector(".fb-clear").addEventListener("click", () => {
      if (!ta.value) return;
      if (!confirm("Clear feedback for this section?")) return;
      ta.value = "";
      localStorage.removeItem(storageKey);
      details.dataset.hasContent = "";
      charCount.textContent = "0 chars";
      toast("Cleared", "ok");
    });
  });

  // Wire up global export buttons
  const exportBtn = document.getElementById("export-all-btn");
  const clearBtn = document.getElementById("clear-all-btn");
  if (exportBtn) exportBtn.addEventListener("click", exportAllFeedback);
  if (clearBtn) clearBtn.addEventListener("click", clearAllFeedback);
}

function collectAllFeedback() {
  // Iterate sections in reading order so the export matches the doc
  const rows = [];
  contentEl.querySelectorAll(".doc-section").forEach(sec => {
    const slug = sec.dataset.slug;
    const title = sec.dataset.title;
    const docLabel = sec.dataset.docLabel;
    const docTitle = sec.dataset.docTitle;
    const val = localStorage.getItem(LS_PREFIX + slug);
    if (val && val.trim()) {
      rows.push({ slug, title, docLabel, docTitle, value: val });
    }
  });
  return rows;
}

async function exportAllFeedback() {
  const rows = collectAllFeedback();
  if (rows.length === 0) {
    toast("No feedback to export yet", "err");
    return;
  }
  const parts = [
    "# Reporting Desk Field Notes — Feedback Export",
    "",
    `**Exported:** ${fmtTimestamp()}`,
    `**Sections with notes:** ${rows.length}`,
    "",
    "---",
    "",
  ];
  // Group by doc
  let currentDoc = null;
  rows.forEach(r => {
    if (r.docTitle !== currentDoc) {
      parts.push(`## ${r.docLabel}. ${r.docTitle}`);
      parts.push("");
      currentDoc = r.docTitle;
    }
    parts.push(`### ${r.title}`);
    parts.push("");
    parts.push(r.value);
    parts.push("");
  });
  const body = parts.join("\n");
  const filename = `reporting-desk-feedback-${fmtTimestamp().slice(0,10)}.md`;
  await shareText("Reporting Desk Feedback Export", body, filename);
}

function clearAllFeedback() {
  const rows = collectAllFeedback();
  if (rows.length === 0) {
    toast("Nothing to clear", "err");
    return;
  }
  if (!confirm(`Clear feedback on all ${rows.length} sections? This can't be undone.`)) return;
  rows.forEach(r => localStorage.removeItem(LS_PREFIX + r.slug));
  // Reset every textarea in the DOM
  contentEl.querySelectorAll(".doc-section").forEach(sec => {
    const ta = sec.querySelector(".feedback-textarea");
    const details = sec.querySelector(".feedback-block");
    const cc = sec.querySelector(".fb-char-count");
    if (ta) ta.value = "";
    if (details) details.dataset.hasContent = "";
    if (cc) cc.textContent = "0 chars";
  });
  toast(`Cleared feedback on ${rows.length} sections`, "ok");
}

function show(html) {
  contentEl.innerHTML = html;
  contentEl.classList.add("on");
  gateEl.style.display = "none";
  document.title = "Reporting Desk — Field Notes";
  installFeedbackBlocks();
  window.scrollTo(0, 0);
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errEl.classList.remove("on");
  btn.disabled = true;
  btn.textContent = "Decrypting…";
  try {
    const html = await tryUnlock(pwInput.value);
    sessionStorage.setItem("_pw", pwInput.value);
    show(html);
  } catch (err) {
    errEl.classList.add("on");
    btn.disabled = false;
    btn.textContent = "Unlock";
    pwInput.select();
  }
});
</script>
</body>
</html>
